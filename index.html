<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karina Akhmetgalina</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <main class="page-wrapper">

        <header class="header">

            <img class="header__image" src="images/Hero_banner.png" alt="Рабочее место разработчика">

            <div class="header__content">

                <h1 class="header__title">
                    Привет 🐅!
                </h1>

                <p class="header__subtitle">
                    Делаю сайты на заказ,<br>
                    верстка, код, поддержка<br>
                    работоспособности
                </p>

            </div>

        </header>

        <section class="profile">

            <img class="profile__avatar" src="images/avatar.jpg" alt="Карина Тигрицина">

            <div class="profile__card">

                <h2 class="profile__name">
                    Карина Тигрицина
                </h2>

                <p class="profile__profession">
                    Разработчик сайтов
                </p>

            </div>

        </section>

        <section class="services">

            <div class="social">

                <a class="social__link social__link--github" href="https://github.com/Tigricina" target="_blank">

                    <img src="images/github.svg" alt="GitHub">

                </a>

                <a class="social__link social__link--telegram" href="https://t.me/tigricina" target="_blank">

                    <img src="images/telegram.svg" alt="Telegram">

                </a>

            </div>

            <h2 class="services__title">
                Разработка сайтов под ключ
            </h2>

            <div class="services__card">

                <p class="services__text">
                    Создание макета,<br>
                    вёрстка <br>(html, css),<br>
                    разработка <br>(JS, PHP)
                </p>

            </div>

        </section>

    </main>
    <script src="js/script.js"></script>
</body>

</html>
